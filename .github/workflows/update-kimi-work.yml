name: Update Kimi Work cask

on:
  schedule:
    - cron: "0 18 * * *"   # daily at 02:00 Beijing time (UTC+8)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest version
        id: check
        run: |
          redirect=$(curl -s -o /dev/null -w "%{redirect_url}" "https://appsupport.moonshot.cn/api/app/pkg/latest/macos/download")
          latest=$(echo "$redirect" | grep -oP 'kimi_\K[\d.]+(?=\.dmg)')
          current=$(grep -oP 'version "\K[^"]+' Casks/kimi-work.rb)
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          if [ -z "$latest" ] || [ "$latest" = "$current" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download and compute SHA256
        if: steps.check.outputs.skip == 'false'
        id: sha
        run: |
          ver="${{ steps.check.outputs.latest }}"
          curl -fsSL -o /tmp/kimi.dmg "https://kimi-img.moonshot.cn/app/download/mac/kimi_${ver}.dmg"
          echo "sha=$(sha256sum /tmp/kimi.dmg | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Update cask file
        if: steps.check.outputs.skip == 'false'
        run: |
          ver="${{ steps.check.outputs.latest }}"
          sha="${{ steps.sha.outputs.sha }}"
          sed -i "s/version \".*\"/version \"${ver}\"/" Casks/kimi-work.rb
          sed -i "s/sha256 \"[a-f0-9]\{64\}\"/sha256 \"${sha}\"/" Casks/kimi-work.rb

      - name: Commit and push
        if: steps.check.outputs.skip == 'false'
        run: |
          ver="${{ steps.check.outputs.latest }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/kimi-work.rb
          git commit -m "kimi-work v${ver}"
          git push
