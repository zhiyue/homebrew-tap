name: Update ZCode cask

on:
  schedule:
    - cron: "0 18 * * *"   # daily at 02:00 Beijing time (UTC+8)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest version
        id: check
        run: |
          page=$(curl -fsSL "https://zcode.z.ai/cn")
          latest=$(echo "$page" | grep -oP 'ZCode-\K\d+\.\d+\.\d+' | head -1)
          current=$(grep -oP 'version "\K[^"]+' Casks/zcode.rb)
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          if [ -z "$latest" ] || [ "$latest" = "$current" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download and compute SHA256
        if: steps.check.outputs.skip == 'false'
        id: sha
        run: |
          ver="${{ steps.check.outputs.latest }}"
          base="https://cdn.zcode-ai.com/zcode/electron/releases/${ver}"
          curl -fsSL -o /tmp/arm64.dmg "${base}/ZCode-${ver}-mac-arm64.dmg"
          curl -fsSL -o /tmp/x64.dmg   "${base}/ZCode-${ver}-mac-x64.dmg"
          echo "arm64=$(sha256sum /tmp/arm64.dmg | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x64=$(sha256sum /tmp/x64.dmg | cut -d' ' -f1)"     >> "$GITHUB_OUTPUT"

      - name: Update cask file
        if: steps.check.outputs.skip == 'false'
        run: |
          ver="${{ steps.check.outputs.latest }}"
          sha_arm64="${{ steps.sha.outputs.arm64 }}"
          sha_x64="${{ steps.sha.outputs.x64 }}"
          sed -i "s/version \".*\"/version \"${ver}\"/" Casks/zcode.rb
          # Update arm64 sha256 (first occurrence)
          sed -i "0,/sha256 \"[a-f0-9]\{64\}\"/s//sha256 \"${sha_arm64}\"/" Casks/zcode.rb
          # Update x64 sha256 (second occurrence)
          sed -i "0,/sha256 \"${sha_arm64}\"/! { 0,/sha256 \"[a-f0-9]\{64\}\"/s//sha256 \"${sha_x64}\"/ }" Casks/zcode.rb

      - name: Commit and push
        if: steps.check.outputs.skip == 'false'
        run: |
          ver="${{ steps.check.outputs.latest }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/zcode.rb
          git commit -m "zcode v${ver}"
          git push
